<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container { text-align: center; user-select: none; }
    .fourohfour {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: clamp(8rem, 35vw, 30rem);
      line-height: 1;
      color: #1a1a1a;
      letter-spacing: -0.05em;
      position: relative;
    }
    .fourohfour::after {
      content: '404';
      position: absolute;
      inset: 0;
      color: #ff2020;
      clip-path: polygon(0 44%, 100% 44%, 100% 54%, 0 54%);
      transform: translateX(4px);
      animation: scanline 3s infinite;
    }
    h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: clamp(1.2rem, 4vw, 3.5rem);
      color: #f5f0e8;
      letter-spacing: -0.03em;
      margin-top: -0.5rem;
    }
    .sub {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 400;
      font-size: clamp(0.55rem, 1.1vw, 0.8rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #f5f0e8;
      margin-top: 1.5rem;
      opacity: 0.25;
    }
    @keyframes scanline {
      0%, 100% { clip-path: polygon(0 44%, 100% 44%, 100% 54%, 0 54%); transform: translateX(4px); }
      50%       { clip-path: polygon(0 28%, 100% 28%, 100% 36%, 0 36%); transform: translateX(-3px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="fourohfour">404</div>
    <h1>this person doesn't exist</h1>
    <p class="sub">yet &nbsp;·&nbsp; 💔</p>
  </div>
</body>
</html>
