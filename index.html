<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>#🇯🇵Japan is turning footsteps into electricity! Using piezoelectric tiles, every step you take generates a small amount of energy. Millions of steps together can power LED lights and displays in busy places like Shibuya Station. A brilliant way to create a sustainable and smart city.</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #f5f0e8;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container { text-align: center; user-select: none; }
    .line {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      display: block;
      color: #0d0d0d;
      font-size: clamp(4rem, 15vw, 13rem);
      letter-spacing: -0.04em;
      line-height: 1.0;
    }
    .line.red { color: #ff2020; }
    .line.big { font-size: clamp(4rem, 15vw, 13rem); }
    .sub {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 400;
      font-size: clamp(0.55rem, 1.1vw, 0.8rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #0d0d0d;
      margin-top: 2.5rem;
      opacity: 0.35;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="line">what the</span>
    <span class="line red">fuck</span>
    <span class="line big">are you</span>
    <span class="line big">doing here</span>
    <p class="sub">nothing to see &nbsp;·&nbsp; move along</p>
  </div>
</body>
</html>
